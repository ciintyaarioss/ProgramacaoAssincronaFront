<div class="page-header">
  <h1>Lista de Professores</h1>

  <button *ngIf="isAdmin" class="add-teacher" (click)="openRegisterModal()">
    Adicionar professor
    <span>
      <img src="/add-user.svg" alt="">
    </span>
  </button>
</div>
<div class="table-container">
    <div class="search-container">
        <div class="input-wrapper">
          <img 
            src="/search.svg" 
            class="input-icon"
          >
          <input placeholder="Buscar disciplina">
        </div>
    </div>

    <app-table
      [dataTeacher]="teachersData"
      [type]="'teacher-for-students'"
    ></app-table>

</div>

<app-register-modal 
  *ngIf="showRegisterModal"
  [isOpen]="showRegisterModal"
  (confirm)="onRegisterSuccess($event)"
  (close)="onModalClose()"
></app-register-modal>
