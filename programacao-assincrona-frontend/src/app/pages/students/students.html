<div class="page-header">
  <h1>Lista de Estudantes</h1>
</div>
<div class="filters-containers" *ngIf="userType === 'admin'">
  <p 
    class="filters-text"
    [class.active]="selectedFilter === 'matriculados'"
    (click)="selectFilter('matriculados')"
  >
    Alunos Matriculados
  </p>

  <span
    class="filters-text"
    [class.active]="selectedFilter === 'pendentes'"
    (click)="selectFilter('pendentes')"
  >
    Alunos sem Aceitação
  </span>
</div>

<div class="table-container">
    <div class="search-container">
        <div class="input-wrapper">
          <img 
            src="/search.svg" 
            class="input-icon"
          >
          <input  #searchInput  placeholder="Buscar usuário"  (input)="searchByName(searchInput.value)"
>
        </div>
    </div>

<app-table
  [dataStudent]="studentsDataFiltered"
  [type]="typeTable"
  [isLoading]="isLoading"
></app-table>

</div>
