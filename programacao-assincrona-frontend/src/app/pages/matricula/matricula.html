<form [formGroup]="registerForm"
      (ngSubmit)="onSubmit()"
      class="login-container">

  <div class="form-container">
    <h1 class="title-login">Matrícula</h1>

    <div class="input-container">
      <label class="label-login">Nome completo</label>
      <input class="input-login"
             type="text"
             formControlName="nome"
             placeholder="Insira seu nome completo">
    </div>

    <div class="input-container">
      <label class="label-login">CPF</label>
      <input class="input-login"
             type="text"
             formControlName="cpf"
             placeholder="Insira seu CPF">
    </div>

    <div class="input-container">
      <label class="label-login">Senha</label>
      <input class="input-login"
             type="password"
             formControlName="senha"
             placeholder="Crie uma senha">
    </div>

    <div class="input-container">
      <label class="label-login">Confirmação de senha</label>
      <input class="input-login"
             type="password"
             formControlName="confirmSenha"
             placeholder="Confirme sua senha">
    </div>

    <button class="button-login" type="submit">
      Finalizar matrícula
    </button>

    <div class="register-link">
      <div class="line"></div>
      <a routerLink="/login">Já é matriculado? Faça login!</a>
      <div class="line"></div>
    </div>
  </div>

  <div class="image-container">
    <img class="image-login" src="matricula-image.png" alt="">
  </div>

</form>
