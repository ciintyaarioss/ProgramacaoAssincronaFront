<div class="page-header">
  <h1>Lista de Disciplinas</h1>
</div>
<div class="table-container">
    <div class="search-container">
      <div class="input-wrapper">
        <img 
          src="/search.svg" 
          class="input-icon"
        >
        <input  #searchInput  placeholder="Buscar disciplina"  (input)="searchByName(searchInput.value)">
      </div>
    </div>
    <app-table
      [dataSubject]="subjectsDataFiltered"
      [type]="'subjects-for-admin'"
      [isLoading]="isLoading"
    ></app-table>
</div>
