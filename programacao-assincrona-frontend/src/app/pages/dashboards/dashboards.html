
<div class="page-header">
  <h1>Dashboards</h1>
</div>
<div class="info-container">
  <app-section-card title="Disciplina">
    <select section-action
     (change)="onSelectChange($event)">
      <option [ngValue]="null">Selecione uma disciplina</option>

      <option *ngFor="let subject of subjectsData"
              [ngValue]="subject">
        {{ subject.disciplina }}
      </option>
    </select>

    <div class="left-cards">
      <app-card
        title="Média dos alunos"
        [value]=subjectSelected.mediaDisciplina
        bgColor="#9FAAC4"
        titleColor="#333"
        valueColor="#333"
      ></app-card>

      <app-card
        title="Menor nota na disciplina"
        [value]=0
        bgColor="#C7CCD9"
        titleColor="#333"
        valueColor="#333"
      ></app-card>

      <app-card
        title="Alunos reprovados"
        [value]=subjectSelected.reprovados
        bgColor="#DADBE6"
        titleColor="#333"
        valueColor="#333"
      ></app-card>

      <app-card
        title="Alunos aprovados"
        [value]=subjectSelected.aprovados
        bgColor="#9FAAC4"
        titleColor="#333"
        valueColor="#333"
      ></app-card>
    </div>

    <div class="right-table">
      <app-table
        type="teacher-for-students"
        [columnsTeacherForStudents]="['Aluno', 'Nota', 'Situação']"
        [dataStudent]="studentsData"
      ></app-table>
    </div>

  </app-section-card>

  <app-section-card title="Geral">
    <div class="left-cards">
      <app-card
        title="Quantidade total de alunos"
        [value]=adminStudentsData.length
        bgColor="#F4B9B9"
        titleColor="#333"
        valueColor="#333"
      ></app-card>

      <app-card
        title="Observações totais"
        [value]=observationsData.length
        bgColor="#E7D6D6"
        titleColor="#333"
        valueColor="#333"
      ></app-card>

      <app-card
        title="Alunos reprovados"
        [value]=0
        bgColor="#E7D6D6"
        titleColor="#333"
        valueColor="#333"
      ></app-card>

      <app-card
        title="Alunos aprovados"
        [value]=0
        bgColor="#F4B9B9"
        titleColor="#333"
        valueColor="#333"
      ></app-card>
    </div>

    <div class="right-table">
      <app-table
        type="students-for-admin"
        [columnsStudentsForAdmin]="['Aluno', 'Matrícula', 'Observações']"
        [dataStudent]="adminStudentsData"
      ></app-table>
    </div>

  </app-section-card>
</div>
