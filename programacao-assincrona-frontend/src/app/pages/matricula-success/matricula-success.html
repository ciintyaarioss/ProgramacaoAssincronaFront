<form  class="login-container">

  <div class="form-container">
    <h1 class="title-login">Matrícula concluída com sucesso!</h1>

    <p>Aguarde a aprovação da matrícula pelo administrador da sua escola. Após um certo período, tente realizar o login!</p>
 
    <button class="button-login" (click)="goToLogin()" >Voltar para o login</button>
  </div>

  <div class="image-container">
    <img class="image-login" src="matricula-success.png" alt="">
  </div>

</form>
