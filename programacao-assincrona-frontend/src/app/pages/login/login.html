<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-container">
  <div class="image-container">
    <img class="image-login" src="login-image.png" alt="">
  </div>

  <div class="form-container">
    <h1 class="title-login">Login</h1>

    <div class="input-container">
      <label class="label-login">CPF</label>
      <input class="input-login"
             type="text"
             formControlName="cpf"
             placeholder="Digite seu CPF">
    </div>

    <div class="input-container password-container">
      <label class="label-login">Senha</label>

      <div class="password-wrapper">
        <input class="input-login"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Digite sua senha">

        <img class="eye-icon"
            [src]="showPassword ? 'eye-closed.svg' : 'eye.svg'"
            (click)="togglePassword()"
            alt="Toggle password">
      </div>

      <div class="forgot-password">
        <a (click)="goToForgotPassword()">Esqueceu a senha?</a>
      </div>
    </div>

    <div class="type-account-container">
      <label class="label-login">Você é um:</label>

      <div class="radio-group">

        <label class="radio-option">
          <input type="radio" value="aluno" formControlName="user_type">
          <span class="custom-radio"></span>
          Aluno
        </label>

        <label class="radio-option">
          <input type="radio" value="professor" formControlName="user_type">
          <span class="custom-radio"></span>
          Professor
        </label>

        <label class="radio-option">
          <input type="radio" value="admin" formControlName="user_type">
          <span class="custom-radio"></span>
          Administrador
        </label>

      </div>
    </div>

    <button class="button-login" type="submit">
      Entrar
    </button>

    <div class="register-link">
      <span class="line"></span>
      <a (click)="goToRegister()">Ainda não é matriculado?</a>
      <span class="line"></span>
    </div>

  </div>
</form>
