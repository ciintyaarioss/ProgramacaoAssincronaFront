<div class="page-wrapper">

  <app-loading-spinner *ngIf="isLoading" [fullscreen]="true"></app-loading-spinner>

  <div *ngIf="!isLoading">

    <h1>Meu Perfil</h1>

    <p *ngFor="let info of infos">{{ info }}</p>

    <button *ngIf="userType === 'professor'" class="btn-change-password" (click)="openChangePasswordModal()">
      Alterar senha
    </button>
    <div *ngIf="userType === 'professor'">
        <h2>Observações enviadas</h2>
        <div class="list-container">
        <div class="white-container">
            @if (observationsList.length > 0) {
                @for (obs of observationsList; track $index) {
                    <app-observation
                        [teacherName]="obs.professor"
                        [studentName]="obs.aluno"
                        [date]="(obs.data | date:'dd/MM/yyyy HH:mm') ?? ''"
                        [message]="obs.text"
                        [type]="'admin'"
                    >
                    </app-observation>
                }
            } @else {
                <p class="without-info">
                    Nenhuma observação encontrada.
                </p>
            }
        </div>
        </div>
    </div>

    <div *ngIf="userType === 'aluno' && subjects.length === 0" class="without-info">
        <h2>Nenhuma disciplina encontrada.</h2>
    </div>
    <div *ngIf="userType === 'aluno' && subjects.length > 0">

        <h2>Notas</h2>
        <div class="filters-button-container">
            <div class="filters-containers">
              <span *ngFor="let sub of subjects"
                  class="filters-text"
                [class.active]="sub.disciplina === selectedFilter"
                (click)="selectFilter(sub)"
              >{{ sub.disciplina }}
              </span>
            </div>
            <button class="button-boletim" (click)="gerarPdf()">Imprimir Boletim</button>
        </div>

        <div class="table-cards-container">
            <div class="grades-container">
                <app-card
                    title="Média Atual"
                    [value]='media'
                    bgColor="#FAFAFA"
                    titleColor="#E2857E"
                    valueColor="#616161"
                ></app-card>
                <app-card
                    title="Aprovado?"
                    [value]='status'
                    bgColor="#FAFAFA"
                    titleColor="#E2857E"
                    valueColor="#616161"
                ></app-card>
            </div>

            <div class="table-col">
                <app-small-table class="table"
                    [data]="scoresDataFiltered"
                    [type]="'scores-for-students'">
                </app-small-table>
            </div>
        </div>


    </div>

  </div>

  <app-change-password-modal
    *ngIf="showChangePasswordModal"
    [isOpen]="showChangePasswordModal"
    [isLoading]="isChangingPassword"
    (confirm)="onChangePasswordConfirm($event)"
    (close)="onChangePasswordModalClose()"
  ></app-change-password-modal>

  <app-system-status
    *ngIf="showStatus"
    [type]="statusType"
    [title]="statusTitle"
    [description]="statusDescription"
    (closed)="onStatusClose()"
  ></app-system-status>

  <app-table-pdf  #pdfContent
    [nome]="infos[0]"
    [cpf]="infos[1]"
    [matricula]="infos[2]"
    [dataScores]="scoresDataForPdf"
    >

  </app-table-pdf>
</div>
