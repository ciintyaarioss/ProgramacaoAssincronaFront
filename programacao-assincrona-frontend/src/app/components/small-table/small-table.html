<div class="table-container">
    <table class="custom-table" *ngIf="type =='scores-for-students'">
        <thead>
                <th >Atividade
                </th>
                <th >Nota</th>
        </thead>
        <tbody>
        <tr *ngFor="let row of data">
            <td >
                <span>{{ row.titulo }}</span>
            </td>
            <td >
                <span>{{ row.valor }}</span>
            </td>
        </tr>
        </tbody>
    </table>
</div>
